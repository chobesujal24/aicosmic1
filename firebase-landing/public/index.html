  <div id="root"></div>

  <script>
    document.addEventListener('click', function(e) {
      const clickable = e.target.closest('button, a');
      
      if (clickable) {
        const href = clickable.getAttribute('href') || '';
        const isFooter = clickable.closest('footer');
        const isSocial = href.includes('x.com') || href.includes('twitter') || href.includes('reddit') || href.includes('medium') || href.includes('youtube') || href.includes('mailto:');
        const isInternal = href.startsWith('#');
        
        // Ignore clicks on footer links, social media links, and internal page scrolling links
        if (isFooter || isSocial || isInternal) {
          return;
        }
        
        // For all other buttons and CTAs, redirect to the Next.js app!
        e.preventDefault();
        e.stopPropagation();
        window.location.href = 'https://qyvera.vercel.app';
      }
    }, true); // use capturing phase

    // Safely style ONLY the mock chat container to match the sleek dark UI
    setInterval(() => {
      const buttons = Array.from(document.querySelectorAll('button'));
      const generateBtn = buttons.find(b => b.innerText && b.innerText.toLowerCase().includes('generate'));
      
      if (generateBtn && !generateBtn.dataset.styled) {
        generateBtn.dataset.styled = 'true';
        
        // Find the main chat container (it usually has rounded borders)
        let container = generateBtn.closest('.rounded-2xl') || generateBtn.closest('div[class*="border"]');
        
        if (container) {
          // Apply sleek dark mode styles safely via inline styles
          container.style.setProperty('background-color', '#18181b', 'important');
          container.style.setProperty('border-color', '#27272a', 'important');
          container.style.setProperty('box-shadow', '0 20px 40px -10px rgba(0,0,0,0.8)', 'important');
          container.style.setProperty('border-width', '1px', 'important');
          container.style.setProperty('border-radius', '1.5rem', 'important');
          
          // Style the text/input area inside it
          const textElements = container.querySelectorAll('div, span, input');
          textElements.forEach(el => {
            if (window.getComputedStyle(el).color === 'rgb(0, 0, 0)' || el.classList.contains('text-foreground')) {
               el.style.setProperty('color', '#fafafa', 'important');
            }
          });
        }
        
        // Style the generate button to look premium
        generateBtn.style.setProperty('background-color', '#fafafa', 'important');
        generateBtn.style.setProperty('color', '#09090b', 'important');
        generateBtn.style.setProperty('font-weight', '600', 'important');
        generateBtn.style.setProperty('border', 'none', 'important');
      }
    }, 200);
  </script>
